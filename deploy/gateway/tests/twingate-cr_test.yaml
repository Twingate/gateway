suite: Twingate Custom Resources
templates:
  - twingate-cr.yaml
tests:
  - it: renders nothing by default
    asserts:
      - hasDocuments:
          count: 0
  - it: fails when kubernetesResource is enabled but gateway is not
    set:
      twingateOperator:
        kubernetesResource:
          enabled: true
    asserts:
      - failedTemplate:
          errorMessage: twingateOperator.kubernetesResource.enabled=true requires twingateOperator.gateway.enabled=true
  - it: renders only the CA and Gateway when gateway is enabled
    set:
      twingateOperator:
        gateway:
          enabled: true
    asserts:
      - hasDocuments:
          count: 2
  - it: renders the certificate authority
    set:
      twingateOperator:
        gateway:
          enabled: true
    documentSelector:
      path: kind
      value: TwingateCertificateAuthority
    asserts:
      - equal:
          path: apiVersion
          value: twingate.com/v1beta
      - equal:
          path: metadata.name
          value: RELEASE-NAME-gateway-ca
      - equal:
          path: spec.type
          value: X509
      - equal:
          path: spec.secretRef.name
          value: RELEASE-NAME-gateway-tls
  - it: renders the gateway bound to the CA and Service
    set:
      twingateOperator:
        gateway:
          enabled: true
    documentSelector:
      path: kind
      value: TwingateGateway
    asserts:
      - equal:
          path: apiVersion
          value: twingate.com/v1beta
      - equal:
          path: metadata.name
          value: RELEASE-NAME-gateway
      - equal:
          path: spec.serviceRef.name
          value: RELEASE-NAME-gateway
      - equal:
          path: spec.serviceRef.port
          value: 443
      - equal:
          path: spec.x509CertificateAuthorityRef.name
          value: RELEASE-NAME-gateway-ca

  - it: renders the in-cluster Kubernetes resource when enabled
    set:
      twingateOperator:
        gateway:
          enabled: true
        kubernetesResource:
          enabled: true
          name: "My cluster"
          alias: cluster.int
          securityPolicyId: "U2VjdXJpdHlQb2xpY3k6MTIz"
    asserts:
      - hasDocuments:
          count: 3
  - it: binds the Kubernetes resource to the gateway and passes fields through
    set:
      twingateOperator:
        gateway:
          enabled: true
        kubernetesResource:
          enabled: true
          name: "My cluster"
          alias: cluster.int
          securityPolicyId: "U2VjdXJpdHlQb2xpY3k6MTIz"
    documentSelector:
      path: kind
      value: TwingateResource
    asserts:
      - equal:
          path: metadata.name
          value: RELEASE-NAME-gateway-resource
      - equal:
          path: spec.type
          value: Kubernetes
      - equal:
          path: spec.address
          value: kubernetes.default.svc.cluster.local
      - equal:
          path: spec.gatewayRef.name
          value: RELEASE-NAME-gateway
      - equal:
          path: spec.name
          value: "My cluster"
      - equal:
          path: spec.alias
          value: cluster.int
      - equal:
          path: spec.securityPolicyId
          value: "U2VjdXJpdHlQb2xpY3k6MTIz"
      - notExists:
          path: spec.enabled
  - it: defaults the resource name when none is provided
    set:
      twingateOperator:
        gateway:
          enabled: true
        kubernetesResource:
          enabled: true
    documentSelector:
      path: kind
      value: TwingateResource
    asserts:
      - equal:
          path: spec.name
          value: "RELEASE-NAME-gateway Kubernetes cluster"
