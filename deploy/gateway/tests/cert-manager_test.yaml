suite: cert-manager resources
templates:
  - cert-manager.yaml
tests:
  - it: should not render when autoGenerated is boolean true (helm engine)
    set:
      tls:
        autoGenerated: true
    asserts:
      - hasDocuments:
          count: 0
  - it: should not render when autoGenerated is boolean false
    set:
      tls:
        autoGenerated: false
    asserts:
      - hasDocuments:
          count: 0
  - it: should not render when certManager.issuerRef.name is unset
    set:
      tls:
        autoGenerated:
          enabled: true
    asserts:
      - hasDocuments:
          count: 0
  - it: should not render when existingSecret is set
    set:
      tls:
        autoGenerated:
          enabled: true
          certManager:
            issuerRef:
              name: my-pki
        existingSecret: my-tls-secret
    asserts:
      - hasDocuments:
          count: 0
  - it: should render the leaf Certificate referencing the configured issuer
    set:
      tls:
        autoGenerated:
          enabled: true
          certManager:
            issuerRef:
              name: my-pki
              kind: ClusterIssuer
    asserts:
      - matchSnapshot: {}
  - it: should include resource alias, custom DNS names, and IP addresses on the leaf Certificate
    set:
      twingate:
        resource:
          enabled: true
          extraAnnotations:
            resource.twingate.com/alias: my-alias.int
      tls:
        autoGenerated:
          enabled: true
          certManager:
            issuerRef:
              name: my-pki
        dnsNames:
          - foo.int
        ipAddresses:
          - 1.1.1.1
    asserts:
      - hasDocuments:
          count: 1
      - equal:
          path: spec.dnsNames
          value:
            - kubernetes
            - kubernetes.default
            - kubernetes.default.svc
            - kubernetes.default.svc.cluster.local
            - my-alias.int
            - foo.int
      - equal:
          path: spec.ipAddresses
          value:
            - 1.1.1.1
