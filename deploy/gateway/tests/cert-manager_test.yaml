suite: cert-manager resources
templates:
  - cert-manager.yaml
tests:
  - it: should not render when autoGenerated is boolean true (helm engine)
    set:
      tls:
        autoGenerated: true
    asserts:
      - hasDocuments:
          count: 0
  - it: should not render when autoGenerated is boolean false
    set:
      tls:
        autoGenerated: false
    asserts:
      - hasDocuments:
          count: 0
  - it: should not render when certManager.enabled is false
    set:
      tls:
        autoGenerated:
          enabled: true
          certManager:
            enabled: false
    asserts:
      - hasDocuments:
          count: 0
  - it: should not render when certManager block is omitted
    set:
      tls:
        autoGenerated:
          enabled: true
    asserts:
      - hasDocuments:
          count: 0
  - it: should not render when existingSecret is set
    set:
      tls:
        autoGenerated:
          enabled: true
          certManager:
            enabled: true
            issuerRef:
              name: my-pki
        existingSecret: my-tls-secret
    asserts:
      - hasDocuments:
          count: 0
  - it: should error when certManager.enabled is true but issuerRef.name is empty
    set:
      tls:
        autoGenerated:
          enabled: true
          certManager:
            enabled: true
    asserts:
      - failedTemplate:
          errorPattern: "tls.autoGenerated.certManager.issuerRef.name is required when tls.autoGenerated.certManager.enabled is true"
  - it: should render the leaf Certificate referencing the configured issuer
    set:
      tls:
        autoGenerated:
          enabled: true
          certManager:
            enabled: true
            issuerRef:
              name: my-pki
              kind: ClusterIssuer
    asserts:
      - matchSnapshot: {}
  - it: should render with overridden commonName
    set:
      tls:
        autoGenerated:
          enabled: true
          certManager:
            enabled: true
            commonName: gateway.example.com
            issuerRef:
              name: my-pki
    asserts:
      - equal:
          path: spec.commonName
          value: gateway.example.com
  - it: should render duration and renewBefore when set
    set:
      tls:
        autoGenerated:
          enabled: true
          certManager:
            enabled: true
            duration: 2160h
            renewBefore: 360h
            issuerRef:
              name: my-pki
    asserts:
      - equal:
          path: spec.duration
          value: 2160h
      - equal:
          path: spec.renewBefore
          value: 360h
  - it: should omit duration and renewBefore when unset
    set:
      tls:
        autoGenerated:
          enabled: true
          certManager:
            enabled: true
            issuerRef:
              name: my-pki
    asserts:
      - notExists:
          path: spec.duration
      - notExists:
          path: spec.renewBefore
  - it: should include resource alias, custom DNS names, and IP addresses on the leaf Certificate
    set:
      twingate:
        resource:
          enabled: true
          extraAnnotations:
            resource.twingate.com/alias: my-alias.int
      tls:
        autoGenerated:
          enabled: true
          certManager:
            enabled: true
            issuerRef:
              name: my-pki
        dnsNames:
          - foo.int
        ipAddresses:
          - 1.1.1.1
    asserts:
      - hasDocuments:
          count: 1
      - equal:
          path: spec.dnsNames
          value:
            - kubernetes
            - kubernetes.default
            - kubernetes.default.svc
            - kubernetes.default.svc.cluster.local
            - my-alias.int
            - foo.int
      - equal:
          path: spec.ipAddresses
          value:
            - 1.1.1.1
