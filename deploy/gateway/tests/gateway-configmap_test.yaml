suite: Gateway configmap with SSH
templates:
  - gateway-configmap.yaml
set:
  twingate:
    network: "acme"
  ssh:
    enabled: true
    gateway:
      username: "gateway"
tests:
  - it: should include SSH without any CA (using auto-generated CA)
    asserts:
      - equal:
          path: data["config.yaml"]
          value: |-
            twingate:
              network: "acme"
              host: "twingate.com"

            port: 8443
            metricsPort: 9090

            auditLog:
              flushInterval: 5m
              flushSizeThreshold: 1e+06

            tls:
              certificateFile: "/etc/gateway/tls/tls.crt"
              privateKeyFile: "/etc/gateway/tls/tls.key"

            ssh:
              gateway:
                username: "gateway"
                key:
                  type: "ed25519"
                hostCertificate:
                  ttl: "24h"
                userCertificate:
                  ttl: "5m"
  - it: should include SSH with manual CA
    set:
      ssh:
        ca:
          manual:
            privateKey: "my-private-key"
    asserts:
      - equal:
          path: data["config.yaml"]
          value: |-
            twingate:
              network: "acme"
              host: "twingate.com"

            port: 8443
            metricsPort: 9090

            auditLog:
              flushInterval: 5m
              flushSizeThreshold: 1e+06

            tls:
              certificateFile: "/etc/gateway/tls/tls.crt"
              privateKeyFile: "/etc/gateway/tls/tls.key"

            ssh:
              gateway:
                username: "gateway"
                key:
                  type: "ed25519"
                hostCertificate:
                  ttl: "24h"
                userCertificate:
                  ttl: "5m"

              ca:
                manual:
                  privateKeyFile: "/etc/gateway/ssh/ca-private-key"
  - it: should include SSH with Vault CA
    set:
      ssh:
        ca:
          vault:
            address: "https://vault.example.com:8200"
            caBundle: "ca-cert"
            namespace: "test-namespace"
            auth:
              token: "test-token"

            mount: "ssh-gateway"
            role: "gateway"

            gatewayHostCA:
              mount: "ssh-gateway-host"
              role: "gateway-host"

            gatewayUserCA:
              mount: "ssh-gateway-user"
              role: "gateway-user"

            upstreamHostCA:
              mount: "ssh-upstream-host"
    asserts:
      - equal:
          path: data["config.yaml"]
          value: |-
            twingate:
              network: "acme"
              host: "twingate.com"

            port: 8443
            metricsPort: 9090

            auditLog:
              flushInterval: 5m
              flushSizeThreshold: 1e+06

            tls:
              certificateFile: "/etc/gateway/tls/tls.crt"
              privateKeyFile: "/etc/gateway/tls/tls.key"

            ssh:
              gateway:
                username: "gateway"
                key:
                  type: "ed25519"
                hostCertificate:
                  ttl: "24h"
                userCertificate:
                  ttl: "5m"

              ca:
                vault:
                  address: "https://vault.example.com:8200"
                  namespace: "test-namespace"
                  mount: "ssh-gateway"
                  role: "gateway"
                  gatewayHostCA:
                    mount: "ssh-gateway-host"
                    role: "gateway-host"
                  gatewayUserCA:
                    mount: "ssh-gateway-user"
                    role: "gateway-user"
                  upstreamHostCA:
                    mount: "ssh-upstream-host"
  - it: should include SSH with Vault AppRole auth
    set:
      ssh:
        ca:
          vault:
            address: "https://vault.example.com:8200"
            auth:
              appRole:
                roleId: "my-role-id"
                secretId: "my-secret-id"
            mount: "ssh-gateway"
            role: "gateway"
    asserts:
      - equal:
          path: data["config.yaml"]
          value: |-
            twingate:
              network: "acme"
              host: "twingate.com"

            port: 8443
            metricsPort: 9090

            auditLog:
              flushInterval: 5m
              flushSizeThreshold: 1e+06

            tls:
              certificateFile: "/etc/gateway/tls/tls.crt"
              privateKeyFile: "/etc/gateway/tls/tls.key"

            ssh:
              gateway:
                username: "gateway"
                key:
                  type: "ed25519"
                hostCertificate:
                  ttl: "24h"
                userCertificate:
                  ttl: "5m"

              ca:
                vault:
                  address: "https://vault.example.com:8200"
                  auth:
                    appRole:
                      mount: "approle"
                      roleID: "my-role-id"
                      secretIDFile: "/etc/gateway/vault/approle/secretId"
                  mount: "ssh-gateway"
                  role: "gateway"
  - it: should error when SSH Gateway username is empty
    set:
      ssh:
        gateway:
          username: ""
    asserts:
      - failedTemplate:
          errorPattern: "ssh.gateway.username is required"
  - it: should error when both manual and Vault config are provided
    set:
      ssh:
        ca:
          manual: {}
          vault: {}
    asserts:
      - failedTemplate:
          errorPattern: "at '/ssh/ca': maxProperties: got 2, want 1"
---
suite: Gateway configmap with WebApp
templates:
  - gateway-configmap.yaml
set:
  twingate:
    network: "acme"
  webApp:
    enabled: true
tests:
  - it: should render empty webApp block when enabled without headers
    asserts:
      - equal:
          path: data["config.yaml"]
          value: |-
            twingate:
              network: "acme"
              host: "twingate.com"

            port: 8443
            metricsPort: 9090

            auditLog:
              flushInterval: 5m
              flushSizeThreshold: 1e+06

            tls:
              certificateFile: "/etc/gateway/tls/tls.crt"
              privateKeyFile: "/etc/gateway/tls/tls.key"

            webApp: {}
  - it: should render webApp with custom headers
    set:
      webApp:
        headers:
          X-Groups: "{{twingate.groups}}"
          X-User: "{{twingate.username}}"
    asserts:
      - equal:
          path: data["config.yaml"]
          value: |-
            twingate:
              network: "acme"
              host: "twingate.com"

            port: 8443
            metricsPort: 9090

            auditLog:
              flushInterval: 5m
              flushSizeThreshold: 1e+06

            tls:
              certificateFile: "/etc/gateway/tls/tls.crt"
              privateKeyFile: "/etc/gateway/tls/tls.key"

            webApp:
              headers:
                X-Groups: '{{twingate.groups}}'
                X-User: '{{twingate.username}}'
  - it: should not render webApp when disabled
    set:
      webApp:
        enabled: false
    asserts:
      - equal:
          path: data["config.yaml"]
          value: |-
            twingate:
              network: "acme"
              host: "twingate.com"

            port: 8443
            metricsPort: 9090

            auditLog:
              flushInterval: 5m
              flushSizeThreshold: 1e+06

            tls:
              certificateFile: "/etc/gateway/tls/tls.crt"
              privateKeyFile: "/etc/gateway/tls/tls.key"
