suite: Gateway configmap
templates:
  - gateway-configmap.yaml
tests:
  - it: should set common settings
    set:
      twingate:
        network: "acme"
        host: "test"
      auditLog:
        flushInterval: "10s"
        flushSizeThreshold: 200
      containerPorts:
        https: 8000
        metrics: 9000
    asserts:
      - equal:
          path: data["config.yaml"]
          value: |-
            twingate:
              network: "acme"
              host: "test"

            port: 8000
            metricsPort: 9000

            auditLog:
              flushInterval: 10s
              flushSizeThreshold: 200

            tls:
              certificateFile: "/etc/gateway/tls/tls.crt"
              privateKeyFile: "/etc/gateway/tls/tls.key"
  - it: should error when network is not provided
    set:
      twingate:
        network: ""
    asserts:
      - failedTemplate:
          errorPattern: "twingate.network is required"
---
suite: Gateway configmap with Kubernetes
templates:
  - gateway-configmap.yaml
set:
  twingate:
    network: "acme"
  kubernetes:
    enabled: true
tests:
  - it: should render empty kubernetes block (in-cluster mode)
    asserts:
      - equal:
          path: data["config.yaml"]
          value: |-
            twingate:
              network: "acme"
              host: "twingate.com"

            port: 8443
            metricsPort: 9090

            auditLog:
              flushInterval: 5m
              flushSizeThreshold: 1e+06

            tls:
              certificateFile: "/etc/gateway/tls/tls.crt"
              privateKeyFile: "/etc/gateway/tls/tls.key"

            kubernetes: {}
  - it: should include kubernetes upstream creds when provided (external mode for testing)
    set:
      kubernetes:
        enabled: true
        upstreams:
          - name: "external"
            bearerTokenFile: "/token"
            caFile: "/ca.crt"
    asserts:
      - equal:
          path: data["config.yaml"]
          value: |-
            twingate:
              network: "acme"
              host: "twingate.com"

            port: 8443
            metricsPort: 9090

            auditLog:
              flushInterval: 5m
              flushSizeThreshold: 1e+06

            tls:
              certificateFile: "/etc/gateway/tls/tls.crt"
              privateKeyFile: "/etc/gateway/tls/tls.key"

            kubernetes:
              upstreams:
                - bearerTokenFile: /token
                  caFile: /ca.crt
                  name: external
  - it: should error when external Kubernetes upstream doesn't have bearer token nor bearer token file
    set:
      kubernetes:
        enabled: true
        upstreams:
          - name: "external"
            caFile: "/ca.crt"
    asserts:
      - failedTemplate:
          errorPattern: "'oneOf' failed"
  - it: should error when external Kubernetes upstream doesn't have CA file
    set:
      kubernetes:
        enabled: true
        upstreams:
          - name: "external"
            bearerToken: "token"
    asserts:
      - failedTemplate:
          errorPattern: "missing property 'caFile'"
---
