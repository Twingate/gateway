{{- if include "gateway.createCertificate" . }}
{{- $cm := .Values.tls.autoGenerated.certManager }}
{{- $fullname := include "gateway.fullname" . }}
{{- $resourceAlias := include "gateway.resourceAlias" . }}
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: {{ printf "%s-crt" $fullname }}
  labels:
    {{- include "gateway.labels" . | nindent 4 }}
spec:
  secretName: {{ include "gateway.tlsSecretName" . }}
  issuerRef:
    name: {{ required "tls.autoGenerated.certManager.issuerRef.name is required when tls.autoGenerated.certManager.enabled is true" $cm.issuerRef.name }}
    kind: {{ $cm.issuerRef.kind }}
    group: {{ $cm.issuerRef.group | default "cert-manager.io" }}
  commonName: {{ default $fullname $cm.commonName }}
  dnsNames:
    - kubernetes
    - kubernetes.default
    - kubernetes.default.svc
    - {{ printf "kubernetes.default.svc.%s" .Values.clusterDomain }}
    {{- if ne $resourceAlias "" }}
    - {{ $resourceAlias }}
    {{- end }}
    {{- range .Values.tls.dnsNames }}
    - {{ . }}
    {{- end }}
  {{- with .Values.tls.ipAddresses }}
  ipAddresses:
    {{- range . }}
    - {{ . }}
    {{- end }}
  {{- end }}
  {{- with $cm.duration }}
  duration: {{ . }}
  {{- end }}
  {{- with $cm.renewBefore }}
  renewBefore: {{ . }}
  {{- end }}
{{- end }}
