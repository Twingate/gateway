# yaml-language-server: $schema=https://goreleaser.com/static/schema.json
# vim: set ts=2 sw=2 tw=0 fo=cnqoj

version: 2

project_name: gateway

before:
  hooks:
    - go mod tidy

snapshot:
  version_template: '{{ .Version }}-{{envOrDefault "VERSION_PRERELEASE" "local"}}-{{ .ShortCommit }}'

checksum:
  name_template: 'checksums.txt'
  algorithm: sha256

builds:
  - id: gateway
    binary: gateway
    env:
      - CGO_ENABLED=0
    targets:
      - linux_amd64
      - linux_arm_v7
      - linux_arm64
      - darwin_amd64
      - darwin_arm64
    flags:
      - -trimpath
    ldflags:
      - -s -w
      - -X gateway/internal/version.Version={{.Version}}
    mod_timestamp: '{{ .CommitTimestamp }}'
  - id: gateway-debug
    binary: gateway-debug
    env:
      - CGO_ENABLED=0
    targets:
      - linux_amd64
      - linux_arm_v7
      - linux_arm64
      - darwin_amd64
      - darwin_arm64
    flags:
      - -trimpath
    ldflags:
      - -X gateway/internal/version.Version={{.Version}}
    mod_timestamp: '{{ .CommitTimestamp }}'

dockers_v2:
  # Snapshot + release: version tag only
  - id: gateway
    dockerfile: Dockerfile.goreleaser
    ids:
      - gateway
    images:
      - "twingate/{{ .ProjectName }}"
      - "ghcr.io/twingate/{{ .ProjectName }}"
    tags:
      # Example: twingate/gateway:0.2.2
      - "{{ .Version }}"
    labels:
      "org.opencontainers.image.created": "{{.Date}}"
      "org.opencontainers.image.title": "{{.ProjectName}}"
      "org.opencontainers.image.revision": "{{.FullCommit}}"
      "org.opencontainers.image.version": "{{.Tag}}"
    flags:
      - "--pull"
      - "--builder={{ .Env.DOCKER_BUILDX_BUILDER }}"
      - "--cache-from={{ .Env.DOCKER_BUILDX_CACHE_FROM }}"
      - "--cache-to={{ .Env.DOCKER_BUILDX_CACHE_TO }}"
    extra_files:
      - LICENSE
  # Release: latest/dev, major, minor tags
  - id: gateway-release
    disable: "{{ .IsSnapshot }}"
    dockerfile: Dockerfile.goreleaser
    ids:
      - gateway
    images:
      - "twingate/{{ .ProjectName }}"
      - "ghcr.io/twingate/{{ .ProjectName }}"
    tags:
      # Example: twingate/gateway:latest (or dev)
      - "{{ if not .Prerelease }}latest{{ else }}dev{{ end }}"
      # Example: twingate/gateway:0
      - "{{ if not .Prerelease }}{{.Major}}{{ end }}"
      # Example: twingate/gateway:0.2
      - "{{ if not .Prerelease }}{{.Major}}.{{.Minor}}{{ end }}"
    labels:
      "org.opencontainers.image.created": "{{.Date}}"
      "org.opencontainers.image.title": "{{.ProjectName}}"
      "org.opencontainers.image.revision": "{{.FullCommit}}"
      "org.opencontainers.image.version": "{{.Tag}}"
    flags:
      - "--pull"
      - "--builder={{ .Env.DOCKER_BUILDX_BUILDER }}"
      - "--cache-from={{ .Env.DOCKER_BUILDX_CACHE_FROM }}"
      - "--cache-to={{ .Env.DOCKER_BUILDX_CACHE_TO }}"
    extra_files:
      - LICENSE
  # Debug snapshot + release: version tag only
  - id: gateway-debug
    dockerfile: Dockerfile.goreleaser-debug
    ids:
      - gateway-debug
    images:
      - "twingate/{{ .ProjectName }}"
      - "ghcr.io/twingate/{{ .ProjectName }}"
    tags:
      - "{{ .Version }}-debug"
    labels:
      "org.opencontainers.image.created": "{{.Date}}"
      "org.opencontainers.image.title": "{{.ProjectName}}"
      "org.opencontainers.image.revision": "{{.FullCommit}}"
      "org.opencontainers.image.version": "{{.Tag}}"
    flags:
      - "--pull"
      - "--builder={{ .Env.DOCKER_BUILDX_BUILDER }}"
      - "--cache-from={{ .Env.DOCKER_BUILDX_CACHE_FROM }}"
      - "--cache-to={{ .Env.DOCKER_BUILDX_CACHE_TO }}"
    extra_files:
      - LICENSE
  # Debug release: latest/dev, major, minor tags
  - id: gateway-debug-release
    disable: "{{ .IsSnapshot }}"
    dockerfile: Dockerfile.goreleaser-debug
    ids:
      - gateway-debug
    images:
      - "twingate/{{ .ProjectName }}"
      - "ghcr.io/twingate/{{ .ProjectName }}"
    tags:
      # Example: twingate/gateway:latest-debug (or dev-debug)
      - "{{ if not .Prerelease }}latest{{ else }}dev{{ end }}-debug"
      # Example: twingate/gateway:0-debug
      - "{{ if not .Prerelease }}{{.Major}}-debug{{ end }}"
      # Example: twingate/gateway:0.2-debug
      - "{{ if not .Prerelease }}{{.Major}}.{{.Minor}}-debug{{ end }}"
    labels:
      "org.opencontainers.image.created": "{{.Date}}"
      "org.opencontainers.image.title": "{{.ProjectName}}"
      "org.opencontainers.image.revision": "{{.FullCommit}}"
      "org.opencontainers.image.version": "{{.Tag}}"
    flags:
      - "--pull"
      - "--builder={{ .Env.DOCKER_BUILDX_BUILDER }}"
      - "--cache-from={{ .Env.DOCKER_BUILDX_CACHE_FROM }}"
      - "--cache-to={{ .Env.DOCKER_BUILDX_CACHE_TO }}"
    extra_files:
      - LICENSE

archives:
  - formats: [tar.gz]
    # this name template makes the OS and Arch compatible with the results of `uname`.
    name_template: >-
      {{ .ProjectName }}_
      {{- title .Os }}_
      {{- if eq .Arch "amd64" }}x86_64
      {{- else if eq .Arch "386" }}i386
      {{- else }}{{ .Arch }}{{ end }}
      {{- if .Arm }}v{{ .Arm }}{{ end }}

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
  groups:
    - title: "✨ Features"
      regexp: '^.*?feat(\([[:word:]]+\))??!?:.+$'
      order: 0
    - title: "🐛 Bug fixes"
      regexp: '^.*?bug(\([[:word:]]+\))??!?:.+$'
      order: 1
    - title: "✅ Tests"
      regexp: '^.*?test(\([[:word:]]+\))??!?:.+$'
      order: 2
    - title: "🔧 Chores"
      regexp: '^.*?chore(\([[:word:]]+\))??!?:.+$'
      order: 3
    - title: Others
      order: 999

release:
  draft: true
